name: steady-state
profile: steady
description: Baseline sustained traffic to evaluate long-running fairness and scaling behavior.

duration_seconds: 300
ramp_up_seconds: 30
sample_interval_seconds: 15
metrics_window_seconds: 300

load:
  producer_send_rate_per_pod: 120
  producer_concurrency: 4

test_matrix:
  producer_replicas: [1, 2, 4]
  collector_replicas: [1, 2]
  consumer_replicas: [1, 2, 4]

thresholds:
  min_fairness_score: 0.90
  max_consumer_skew_ratio: 1.40
  min_consumer_receive_ratio: 0.98
  min_collector_receive_ratio: 0.98
