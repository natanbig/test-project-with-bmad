apiVersion: v1
kind: ConfigMap
metadata:
  name: okps-producer-config
  namespace: okps
  labels:
    app.kubernetes.io/name: okps-producer
    app.kubernetes.io/component: producer
    app.kubernetes.io/part-of: okps-pipeline
data:
  PRODUCER_ID: producer-k8s
  PAYLOAD_MIN_BYTES: "128"
  PAYLOAD_MAX_BYTES: "4096"
  COMPRESSION: gzip
  OTLP_ENDPOINT: okps-collector.okps.svc.cluster.local:4317
  OTLP_INSECURE: "true"
  SEND_INTERVAL_MS: "250"
  METRICS_LISTEN_ADDR: ":2112"
  RETRY_MAX_ATTEMPTS: "5"
  RETRY_INITIAL_BACKOFF_MS: "100"
  RETRY_MAX_BACKOFF_MS: "2000"
  RETRY_TIMEOUT_MS: "5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: okps-consumer-config
  namespace: okps
  labels:
    app.kubernetes.io/name: okps-consumer
    app.kubernetes.io/component: consumer
    app.kubernetes.io/part-of: okps-pipeline
data:
  CONSUMER_OTLP_LISTEN_ADDR: ":4317"
  CONSUMER_METRICS_LISTEN_ADDR: ":2113"
  PAYLOAD_MIN_BYTES: "128"
  PAYLOAD_MAX_BYTES: "4096"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: okps-collector-config
  namespace: okps
  labels:
    app.kubernetes.io/name: okps-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: okps-pipeline
data:
  collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

      prometheus/self:
        config:
          scrape_configs:
            - job_name: otelcol-self
              scrape_interval: 10s
              static_configs:
                - targets: ["127.0.0.1:8888"]

    processors:
      batch:
        timeout: 1s
        send_batch_size: 256

      transform/runid_to_service:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - set(resource.attributes["service.name"], attributes["okps.run_id"]) where attributes["okps.run_id"] != nil

      metricstransform/collector_counters:
        transforms:
          - include: otelcol_receiver_accepted_spans
            match_type: strict
            action: update
            new_name: okps_collector_messages_received_total
          - include: otelcol_exporter_sent_spans
            match_type: strict
            action: update
            new_name: okps_collector_messages_exported_total
          - include: otelcol_exporter_send_failed_spans
            match_type: strict
            action: update
            new_name: okps_collector_export_errors_total

    exporters:
      loadbalancing:
        routing_key: service
        resolver:
          dns:
            hostname: okps-consumer-headless.okps.svc.cluster.local
            port: "4317"
            interval: 5s
            timeout: 1s
        protocol:
          otlp:
            tls:
              insecure: true
        sending_queue:
          enabled: true
          queue_size: 10000
          num_consumers: 4

      prometheus:
        endpoint: 0.0.0.0:8889

    service:
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888

      pipelines:
        traces:
          receivers: [otlp]
          processors: [transform/runid_to_service, batch]
          exporters: [loadbalancing]

        metrics/internal:
          receivers: [prometheus/self]
          processors: [metricstransform/collector_counters, batch]
          exporters: [prometheus]
