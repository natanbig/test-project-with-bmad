apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: okps-collector
  namespace: okps
  labels:
    app.kubernetes.io/name: okps-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: okps-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: okps-collector
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
