apiVersion: apps/v1
kind: Deployment
metadata:
  name: okps-prometheus
  namespace: okps
  labels:
    app.kubernetes.io/name: okps-prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: okps-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: okps-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: okps-prometheus
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: okps-pipeline
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=2h
            - --storage.tsdb.retention.size=192MB
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: okps-prometheus-config
        - name: prometheus-data
          emptyDir:
            sizeLimit: 1Gi
