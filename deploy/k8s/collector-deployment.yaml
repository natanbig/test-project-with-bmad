apiVersion: apps/v1
kind: Deployment
metadata:
  name: okps-collector
  namespace: okps
  labels:
    app.kubernetes.io/name: okps-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: okps-pipeline
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: okps-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: okps-collector
        app.kubernetes.io/component: collector
        app.kubernetes.io/part-of: okps-pipeline
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.130.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otelcol/config.yaml
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 8888
              name: metrics-self
            - containerPort: 8889
              name: metrics-exp
          volumeMounts:
            - name: collector-config
              mountPath: /etc/otelcol
              readOnly: true
          envFrom:
            - secretRef:
                name: okps-runtime-secrets
                optional: true
          readinessProbe:
            tcpSocket:
              port: otlp-grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: otlp-grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: collector-config
          configMap:
            name: okps-collector-config
            items:
              - key: collector-config.yaml
                path: config.yaml
