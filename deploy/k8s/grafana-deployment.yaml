apiVersion: apps/v1
kind: Deployment
metadata:
  name: okps-grafana
  namespace: okps
  labels:
    app.kubernetes.io/name: okps-grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: okps-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: okps-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: okps-grafana
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: okps-pipeline
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
              readOnly: true
            - name: grafana-dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
              readOnly: true
            - name: grafana-dashboard-content
              mountPath: /var/lib/grafana/dashboards/okps
              readOnly: true
      volumes:
        - name: grafana-provisioning
          configMap:
            name: okps-grafana-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: grafana-dashboards-provider
          configMap:
            name: okps-grafana-config
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: grafana-dashboard-content
          configMap:
            name: okps-grafana-dashboard
